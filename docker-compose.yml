version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_DB: dialog_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: secretpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: crm_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    container_name: crm_worker
    restart: always
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env

  celery-beat:
    build: ./backend
    container_name: crm_beat
    restart: always
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: crm_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: crm_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
